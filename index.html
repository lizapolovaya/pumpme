<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athletic Recomp Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <nav><h1>⚡ Recomp Pro</h1></nav>
    
    <main>
        <section id="logger">
            <h2>Log Your Set</h2>
            <select id="exercise">
                <option value="Smith Hip Thrust">Smith Hip Thrust</option>
                <option value="RDL">RDL</option>
                <option value="Smith Squat">Smith Squat</option>
                <option value="Lateral Raise">Lateral Raise</option>
            </select>
            <div class="input-group">
                <input type="number" id="weight" placeholder="Weight (kg)">
                <input type="number" id="reps" placeholder="Reps">
                <input type="number" id="rpe" placeholder="RPE (1-10)" min="1" max="10">
            </div>
            <button onclick="saveSet()">Log Set</button>
        </section>

        <section id="history">
            <h2>Session History</h2>
            <ul id="logList"></ul>
            <button class="clear-btn" onclick="clearLogs()">Clear All Data</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
